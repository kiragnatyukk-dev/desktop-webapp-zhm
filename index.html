<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись в DIKIDI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>

     @font-face {
  font-family: 'Handgeschrieben';
  src: url('fonts/Handgeschrieben-Regular.otf') format('truetype');
}
html, body{
  height: 100%;
  margin: 0;
}
    body {
      display: flex;
      align-items: center;
      justify-content: center;

      background-image: url('background.png');
      background-repeat: repeat;
      background-size: 220px 220px;
    }

    .book-button {
      display: inline-block;
      padding: 18px 36px;
      background-color: #fff;
      color: #000;
      text-decoration: none;
      font-family: 'Handgeschrieben', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;

      /* неровные, "нарисованные от руки" края */
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      border: 3px solid #000;

      transform: rotate(-2deg);
      transition: transform 0.15s ease;
    }

    .book-button:active {
      transform: rotate(-2deg) scale(0.96);
    }
  </style>
    </head>
    <body>
     <a href="https://dikidi.net/#widget=213978" class="book-button">Записаться на стрижку</a>

      <script type="text/javascript" src="https://dikidi.net/assets/js/widget_record/widget2.min.js?v=1773811740">
        
      </script>

    </body>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</html>
